name: test

on:
  push:
    branches:
      - main
  pull_request: null

jobs:
  test:
    name: test
    strategy:
      matrix:
        pyver: ["3.12"]

    runs-on: "ubuntu-latest"

    steps:
      - uses: actions/checkout@v5

      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.pyver }}
          channels: conda-forge
          channel-priority: strict,defaults
          show-channel-urls: true

      - name: Install DM stack and mypy with conda
        shell: bash -l {0}
        run: |
          conda config --set always_yes yes

          conda install -q stackvana=0
          conda install -q mypy

      - name: Build and run tests
        shell: bash -l {0}
        run: |
          setup -v -r .
          scons

      - name: Run MyPy
        shell: bash -l {0}
        run: |
          setup -v -r .
          mypy python/ tests/

      - name: Upload coverage to codecov
        uses: codecov/codecov-action@v4
        with:
          files: tests/.tests/pytest-dax_images_cutout.xml-cov-dax_images_cutout.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          files: tests/.tests/pytest-dax_images_cutout.xml
          token: ${{ secrets.CODECOV_TOKEN }}
